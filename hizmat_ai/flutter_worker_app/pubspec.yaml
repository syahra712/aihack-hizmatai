name: hizmat_worker
description: HizmatAI Worker App — Service Provider Side

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase — same project as customer app (hizmatai)
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  google_sign_in: ^6.2.1

  # State + Navigation
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0

  # UI
  google_fonts: ^6.1.0
  flutter_animate: ^4.5.0
  fl_chart: ^0.68.0

  # Device
  geolocator: ^12.0.0
  image_picker: ^1.0.7
  connectivity_plus: ^6.0.3
  flutter_local_notifications: ^18.0.0
  local_auth: ^2.2.0

  # Utilities
  uuid: ^4.3.3
  intl: ^0.19.0
  url_launcher: ^6.2.5
  http: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  # Poppins served via google_fonts package — no local font assets needed
