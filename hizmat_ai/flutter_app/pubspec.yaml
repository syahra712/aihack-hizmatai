name: hizmat_ai
description: Agentic home service booking for Pakistan's informal economy.
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  google_fonts: ^6.1.0
  flutter_animate: ^4.5.0
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.2.0
  shared_preferences: ^2.2.3
  intl: ^0.19.0
  uuid: ^4.3.3
  http: ^1.2.1
  cupertino_icons: ^1.0.6

  # Firebase
  firebase_core: ^3.13.1
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.6
  google_sign_in: ^6.2.1

  # Worker registration
  image_picker: ^1.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
